# Dán khối này vào section [task_local] trong file cấu hình QuantumultX
# đang dùng. Nếu đã có [task_local] thì chỉ thêm dòng event-interaction
# vào bên trong, không tạo section trùng.

[task_local]
event-interaction https://raw.githubusercontent.com/2KGT/sv/refs/heads/main/scripts/QuantumultX/nodecheck.js, tag=Kiểm Tra Chặn Node, img-url=bolt.horizontal.icloud.fill.system, enabled=true

# Cách dùng sau khi thêm:
#   1. Reload cấu hình QX
#   2. Vào tab Node/Server, nhấn giữ (long-press) vào node cần kiểm tra
#   3. Chọn "Kiểm Tra Chặn Node" trong menu hiện ra
#   4. Đợi vài giây, kết quả hiện ngay dạng popup HTML trong QX
#
# Script tự lấy tên node đang nhấn giữ qua $environment.params, không cần
# nhập host/port thủ công như phiên bản rewrite_local trước đó.
